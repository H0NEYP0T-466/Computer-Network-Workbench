name: Bug report
description: Report a problem with a lab configuration
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us diagnose and fix the issue.

  - type: dropdown
    id: lab-file
    attributes:
      label: Lab File
      description: Which lab file has the issue?
      options:
        - lab#2.pkt
        - lab#3.pkt
        - Lab#4.pkt
        - lab#5.pkt
        - lab#6.pkt
        - 30-apr.pkt
        - 7-may-26.pkt
        - 7-may-labtask.pkt
        - 14-may.pkt
        - LABTASK.pkt
        - oel.pkt
        - PROJECT/project.pkt
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug
      placeholder: "Briefly describe what happened..."
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the issue
      placeholder: |
        1. Open Packet Tracer
        2. Load <filename>.pkt
        3. Click on <device>
        4. Run <command>
        5. See error...
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "Describe what should have happened..."
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Describe what actually happened..."
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide your environment details
      placeholder: |
        - OS: [e.g., Windows 11, Ubuntu 22.04, macOS 14]
        - Packet Tracer Version: [e.g., 8.2.0]
        - Device: [e.g., Router 2911, Switch 2960]
      value: |
        - OS:
        - Packet Tracer Version:
        - Device:
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem
      placeholder: "Drag and drop images here or paste image URLs..."

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How severe is this bug?
      options:
        - Low (minor inconvenience)
        - Medium (affects lab functionality)
        - High (major functionality broken)
        - Critical (lab unusable)
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem
      placeholder: "Any other information that might help us resolve this issue..."

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](./CODE_OF_CONDUCT.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
